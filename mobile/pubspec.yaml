name: dentiflow
description: DentiFlow — dental clinic management mobile app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # HTTP & storage
  http: any
  flutter_secure_storage: any
  shared_preferences: any

  # Real-time
  signalr_netcore: any

  # Notifications
  flutter_local_notifications: any

  # Localization & date
  intl: any
  flutter_localizations:
    sdk: flutter

  # Config
  flutter_dotenv: any
  package_info_plus: any

  # UI
  cupertino_icons: any
  shimmer: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    # - assets/images/

