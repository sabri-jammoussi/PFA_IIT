name: dentiflow
description: DentiFlow — dental clinic management mobile app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # HTTP & storage
  http: ^1.6.0
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.5.5

  # Real-time
  signalr_netcore: ^1.4.4

  # Notifications
  flutter_local_notifications: ^19.0.0

  # Localization & date
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter

  # Config
  flutter_dotenv: ^5.1.0
  package_info_plus: ^8.0.2

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - .env.prod
    - assets/images/

  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
